# PnP is not currently supported by tsdown/rolldown
nodeLinker: node-modules

enableGlobalCache: false

# Build scripts disabled by default; allowlist via dependencyMeta in package.json
enableScripts: false

checksumBehavior: throw

enableTelemetry: false

# Supply chain attack mitigation — require packages to be at least 14 days old
# See: https://blog.yossarian.net/2025/11/21/We-should-all-be-using-dependency-cooldowns
npmMinimalAgeGate: "14d"

npmRegistryServer: "https://registry.npmjs.org"
